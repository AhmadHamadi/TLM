        "@type": "ImageObject",

      },
      "description": "Digital marketing agency built specifically for contractors and trade businesses.",
      "email": "info@tradeleadsmarketing.ca",
      "telephone": "+1-289-489-1167",
      "areaServed": ["CA", "US"],

        "@type": "ContactPoint",
        "telephone": "+1-289-489-1167",
        "contactType": "customer service",
        "email": "info@tradeleadsmarketing.ca",

      }

    <!-- Website (enables sitelinks search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://tradeleadsmarketing.ca/#website",
      "url": "https://tradeleadsmarketing.ca/",

      "description": "Digital marketing for contractors who want more qualified leads.",
      "publisher": { "@id": "https://tradeleadsmarketing.ca/#organization" },
      "inLanguage": "en-CA"
    }
    </script>

    <!-- ProfessionalService with services + aggregate rating -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "@id": "https://tradeleadsmarketing.ca/#service",
      "name": "Trade Leads Marketing",
      "image": "https://tradeleadsmarketing.ca/tlmlogo.png",
      "url": "https://tradeleadsmarketing.ca/",
      "telephone": "+1-289-489-1167",
      "email": "info@tradeleadsmarketing.ca",
      "priceRange": "$$",
      "description": "Digital marketing agency specializing in lead generation for contractors — Google Ads, contractor websites, local SEO, Google Business Profile optimization, and lead tracking.",
      "areaServed": [
        { "@type": "Country", "name": "Canada" },
        { "@type": "Country", "name": "United States" }
      ],
      "serviceType": [
        "Google Ads Management",
        "Contractor Website Design",
        "Local SEO",
        "Google Business Profile Optimization",
        "AI Search Optimization",
        "Conversion Rate Optimization",
        "Call & Form Tracking"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Contractor Marketing Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Google Ads for Contractors", "description": "Target homeowners actively searching for your service and turn clicks into quote requests." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Contractor Website Design", "description": "Fast, modern websites built to convert visitors into booked estimates." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Local SEO", "description": "Rank for high-intent local searches like 'concrete contractor near me'." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Google Business Profile Optimization", "description": "Dominate the local map pack with photos, reviews, and category targeting." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "AI Search Optimization", "description": "Show up inside ChatGPT, Google AI Overviews, and Perplexity." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Lead & Call Tracking", "description": "See every call, form, and lead source — and know which campaigns book real jobs." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Conversion Rate Optimization", "description": "Test offers, headlines, and forms to squeeze more leads from the same traffic." } }
        ]
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5.0",
        "reviewCount": "27",
        "bestRating": "5",
        "worstRating": "1"
      }
    }
    </script>

    <!-- FAQPage (rich-snippet eligible on Google) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do you only work with contractors?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Contractors and local trade businesses only — landscaping, concrete, roofing, plumbing, electrical, HVAC, paving, builders, and renovation companies. That focus is why our campaigns convert."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to see results?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "It depends on your market, budget, and starting point — we don't make blanket guarantees. Google Ads can start producing qualified leads within the first 1–2 weeks once tracking is set up correctly. SEO and Google Business Profile improvements typically take 60–90+ days to gain traction. We track everything from day one, so even when results take time to compound, you see exactly what is happening week by week."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need a new website?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Not always. We audit your current site first. If it converts, we leave it. If it leaks leads, we rebuild key pages or the whole site — whatever gets you the highest ROI fastest."
          }
        },
        {
          "@type": "Question",
          "name": "Do you manage Google Ads?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — and it is a core service. We structure campaigns by service type, exclude wasteful keywords, write contractor-specific ad copy, and tie every click back to booked jobs."
          }
        },
        {
          "@type": "Question",
          "name": "Do you help with SEO and Google Business Profile?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Local SEO and Google Business Profile optimization are non-negotiable for contractors. We handle citations, reviews strategy, photos, posts, and on-page service content together."
          }
        },
        {
          "@type": "Question",
          "name": "Can you track calls and form submissions?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Always. We install call tracking, form tracking, and conversion tracking before we spend a dollar on ads. You will know exactly which campaign, ad, and keyword booked the job."
          }
        },
        {
          "@type": "Question",
          "name": "What makes you different from other marketing agencies?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We only work with contractors. We focus on the metrics that map to booked jobs — not just clicks. And we give you straight answers about what is and isn't working, without pretty reports that hide bad performance. No 6-month lock-ins, no jargon, no inflated promises."
          }
        }
      ]
    }
    </script>
